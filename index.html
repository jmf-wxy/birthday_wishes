<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日快乐！</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a0533 0%, #4a1942 30%, #6b2d5c 60%, #ff6b9d 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(255,215,0,0.6), transparent),
                radial-gradient(1px 1px at 80% 90%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 10% 80%, rgba(255,107,157,0.5), transparent),
                radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.6), transparent);
            pointer-events: none;
            z-index: 0;
            animation: twinkle 4s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        *:focus-visible {
            outline: 3px solid rgba(255, 107, 157, 0.6);
            outline-offset: 2px;
        }

        h1, h2, h3 {
            font-family: 'Ma Shan Zheng', cursive;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Floating particles background */
        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 8s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Music Control */
        .music-control {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 64px;
            height: 64px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8E53 100%);
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .music-control:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(255, 107, 157, 0.6);
        }

        .music-control:active {
            transform: scale(0.95);
        }

        .music-control.playing {
            animation: pulse 1s ease-in-out infinite;
        }

        /* Settings Button */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .settings-btn:active {
            transform: rotate(90deg) scale(0.95);
        }

        /* Share Button */
        .share-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            background: rgba(107, 203, 119, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 24px rgba(107, 203, 119, 0.4);
        }

        .share-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 36px rgba(107, 203, 119, 0.5);
        }

        .share-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 244, 255, 0.95) 100%);
            border-radius: 32px;
            padding: 44px;
            max-width: 480px;
            width: 90%;
            color: #333;
            transform: scale(0.85) translateY(30px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .modal-overlay.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            font-size: 2.2rem;
            margin-bottom: 28px;
            text-align: center;
            background: linear-gradient(135deg, #FF6B9D, #FF8E53, #FFB347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-form {
            margin-bottom: 24px;
        }

        .modal-input {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid rgba(200, 180, 220, 0.4);
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(255, 255, 255, 0.8);
        }

        .modal-input:focus {
            outline: none;
            border-color: #FF6B9D;
            box-shadow: 0 0 0 5px rgba(255, 107, 157, 0.15), 0 8px 24px rgba(255, 107, 157, 0.1);
            transform: scale(1.01);
        }

        .modal-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8E53 100%);
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            position: relative;
            overflow: hidden;
        }

        .modal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .modal-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(255, 107, 157, 0.5);
        }

        .modal-btn:hover::before {
            left: 100%;
        }

        .modal-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* Share Modal Specific */
        .share-link-container {
            display: flex;
            gap: 14px;
            margin-top: 24px;
        }

        .share-link-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(200, 180, 220, 0.4);
            border-radius: 16px;
            font-size: 0.95rem;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .share-link-input:focus {
            outline: none;
            border-color: #FF6B9D;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
        }

        .copy-btn {
            padding: 16px 28px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
        }

        .copy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.45);
        }

        .copy-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .share-note {
            font-size: 0.9rem;
            color: #888;
            margin-top: 16px;
            text-align: center;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 100px 20px 60px;
            z-index: 10;
        }

        .hero-title {
            font-size: clamp(3.5rem, 12vw, 7rem);
            margin-bottom: 24px;
            text-shadow: 0 0 40px rgba(255, 107, 157, 0.5), 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: bounceIn 1.2s ease-out, glow 2s ease-in-out infinite;
            background: linear-gradient(135deg, #FFD93D 0%, #FF6B9D 50%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 107, 157, 0.8)); }
        }

        .hero-subtitle {
            font-size: clamp(1.3rem, 3vw, 2rem);
            opacity: 0.95;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease-out 0.4s both;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cake Section */
        .cake-container {
            position: relative;
            cursor: pointer;
            transition: all 0.5s ease;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .cake-container:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 20px 40px rgba(255, 107, 157, 0.4));
        }

        .cake {
            position: relative;
            width: 300px;
            height: 320px;
        }

        .cake-layer {
            position: absolute;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .cake-layer-1 {
            bottom: 0;
            width: 300px;
            height: 90px;
            background: linear-gradient(to bottom, #F8E1A6 0%, #E8C96A 100%);
        }

        .cake-layer-1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: linear-gradient(to bottom, #FFB6C1, #FF69B4);
            border-radius: 12px 12px 0 0;
        }

        .cake-layer-2 {
            bottom: 90px;
            width: 260px;
            height: 75px;
            left: 20px;
            background: linear-gradient(to bottom, #FFE4B5 0%, #FFD700 100%);
        }

        .cake-layer-2::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(to bottom, #87CEEB, #4169E1);
            border-radius: 12px 12px 0 0;
        }

        .cake-layer-3 {
            bottom: 165px;
            width: 220px;
            height: 65px;
            left: 40px;
            background: linear-gradient(to bottom, #FFF0F5 0%, #FFB6C1 100%);
        }

        .cake-layer-3::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 18px;
            background: linear-gradient(to bottom, #98FB98, #32CD32);
            border-radius: 12px 12px 0 0;
        }

        .candles {
            position: absolute;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 22px;
        }

        .candle {
            width: 14px;
            height: 55px;
            background: linear-gradient(to right, #FF69B4, #FF1493, #FF69B4);
            border-radius: 4px;
            position: relative;
        }

        .flame {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 40px;
            background: radial-gradient(ellipse at bottom, #FFD93D 0%, #FF6B6B 50%, transparent 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.2s ease-in-out infinite alternate;
        }

        .flame::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 18px;
            background: radial-gradient(ellipse at bottom, #FFF 0%, #FFD93D 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-3deg); }
            100% { transform: translateX(-50%) scale(1.15) rotate(3deg); }
        }

        .candle.blown .flame {
            animation: blowOut 0.6s ease-out forwards;
        }

        @keyframes blowOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            30% { opacity: 1; transform: translateX(-50%) scale(1.8) rotate(20deg); }
            100% { opacity: 0; transform: translateX(-50%) scale(3) rotate(45deg); }
        }

        .cherry {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #FF6B6B, #DC143C);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .cherry-1 {
            bottom: 235px;
            left: 60px;
        }

        .cherry-2 {
            bottom: 245px;
            left: 200px;
        }

        .cherry::after {
            content: '';
            position: absolute;
            top: -18px;
            left: 50%;
            width: 3px;
            height: 18px;
            background: #228B22;
            transform: translateX(-50%);
        }

        .instruction {
            margin-top: 35px;
            font-size: 1.3rem;
            opacity: 0.9;
            animation: pulse 2s ease-in-out infinite;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Blessing Wall */
        .blessing-wall {
            padding: 100px 0;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 10;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 60px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #FFD93D, #FF6B9D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .blessing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            min-height: 300px;
        }

        .blessing-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: cardIn 0.6s ease-out both;
        }

        .blessing-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 24px 60px rgba(255, 107, 157, 0.28), 0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        .blessing-card:active {
            transform: translateY(-8px) scale(1.01);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .blessing-header {
            height: 10px;
        }

        .blessing-content {
            padding: 28px 32px;
        }

        .blessing-name {
            font-weight: 700;
            font-size: 1.35rem;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2d2d2d;
        }

        .blessing-name::before {
            content: '🎁';
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
        }

        .blessing-name-wrapper {
            font-weight: 700;
            font-size: 1.35rem;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2d2d2d;
        }

        .blessing-name-display,
        .blessing-name-actual {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .blessing-name-display::before {
            content: '👤';
        }

        .blessing-name-actual::before {
            content: '👤';
        }

        .blessing-message {
            color: #4a4a4a;
            line-height: 1.8;
            margin-bottom: 16px;
            font-size: 1.08rem;
        }

        .blessing-time {
            font-size: 0.92rem;
            opacity: 0.65;
            color: #777;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            opacity: 0.85;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 24px;
            animation: bounce 1.2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-18px) scale(1.05); }
        }

        .empty-state-text {
            font-size: 1.5rem;
            font-weight: 500;
        }

        /* Form Section */
        .form-section {
            padding: 100px 0;
            position: relative;
            z-index: 10;
        }

        .blessing-form {
            max-width: 600px;
            margin: 0 auto;
            padding: 52px;
            background: rgba(255, 255, 255, 0.11);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .form-title {
            font-size: 2.4rem;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, #FFD93D, #FF6B9D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 26px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.95);
            font-size: 1.1rem;
            font-family: inherit;
            color: #333;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #FFD93D;
            box-shadow: 0 0 0 5px rgba(255, 217, 61, 0.2), 0 8px 24px rgba(255, 217, 61, 0.15);
            transform: scale(1.01);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: #999;
        }

        .form-textarea {
            min-height: 135px;
            resize: vertical;
        }

        .form-error {
            color: #ff6b6b;
            font-size: 0.98rem;
            margin-top: 10px;
            display: none;
            padding-left: 4px;
        }

        .form-error.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 20px 32px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8E53 100%);
            color: white;
            font-size: 1.35rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 12px 40px rgba(255, 107, 157, 0.4);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 55px rgba(255, 107, 157, 0.5);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(-3px) scale(0.98);
        }

        /* Canvas for fireworks */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
        }

        /* Enhanced Confetti */
        .confetti {
            position: fixed;
            top: -15px;
            width: 14px;
            height: 14px;
            pointer-events: none;
            z-index: 1999;
            animation: confettiFall linear forwards;
        }

        .confetti.square {
            border-radius: 2px;
        }

        .confetti.circle {
            border-radius: 50%;
        }

        .confetti.star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .confetti.heart {
            clip-path: polygon(50% 50%, 0% 25%, 50% 0%, 100% 25%, 100% 50%, 50% 100%, 0% 50%);
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }

        /* Success Message */
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #6BCB77 0%, #4CAF50 100%);
            color: white;
            padding: 35px 60px;
            border-radius: 24px;
            font-size: 1.8rem;
            font-weight: 700;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 3001;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .success-message.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 50px 20px;
            opacity: 0.8;
            font-size: 1rem;
            position: relative;
            z-index: 10;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: scrollBounce 2s ease-in-out infinite;
        }

        @keyframes scrollBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(12px); }
        }

        .scroll-indicator span {
            display: block;
            width: 32px;
            height: 52px;
            border: 2px solid white;
            border-radius: 22px;
            position: relative;
        }

        .scroll-indicator span::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 12px;
            background: white;
            border-radius: 4px;
            animation: scrollDot 2s ease-in-out infinite;
        }

        @keyframes scrollDot {
            0%, 100% { top: 10px; opacity: 1; }
            50% { top: 22px; opacity: 0.3; }
        }

        /* Shooting Stars */
        .shooting-star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1500;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
            right: 4px;
        }

        /* Bubbles */
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 1500;
            animation: bubbleFloat linear forwards;
        }

        @keyframes bubbleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) scale(1);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                padding: 100px 20px 60px;
            }

            .cake {
                transform: scale(0.85);
            }

            .blessing-grid {
                grid-template-columns: 1fr;
            }

            .blessing-form {
                padding: 35px 25px;
            }

            .share-btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }

            .settings-btn {
                width: 44px;
                height: 44px;
            }

            .music-control {
                width: 54px;
                height: 54px;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="floating-particles" id="floatingParticles"></div>

    <footer class="footer">
        <p>Made with 💖 for your special day</p>
    </footer>

    <script>
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        let audioContext;
        let isMusicPlaying = false;
        let musicButton = document.getElementById('musicControl');

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playNote(frequency, duration, startTime) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, startTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

            oscillator.start(startTime);
            oscillator.stop(startTime + duration);
        }

        function playBirthdayMelody() {
            if (!audioContext) initAudio();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            const notes = [
                { freq: 264, time: 0 },
                { freq: 264, time: 0.25 },
                { freq: 297, time: 0.5 },
                { freq: 264, time: 0.75 },
                { freq: 352, time: 1 },
                { freq: 330, time: 1.5 },
                { freq: 0, time: 1.75 },
                { freq: 264, time: 2 },
                { freq: 264, time: 2.25 },
                { freq: 297, time: 2.5 },
                { freq: 264, time: 2.75 },
                { freq: 396, time: 3 },
                { freq: 352, time: 3.5 },
                { freq: 0, time: 3.75 },
                { freq: 264, time: 4 },
                { freq: 264, time: 4.25 },
                { freq: 528, time: 4.5 },
                { freq: 440, time: 4.75 },
                { freq: 352, time: 5 },
                { freq: 297, time: 5.25 },
                { freq: 440, time: 5.5 },
                { freq: 396, time: 6 },
                { freq: 352, time: 6.5 }
            ];

            const startTime = audioContext.currentTime;
            notes.forEach(note => {
                if (note.freq > 0) {
                    playNote(note.freq, 0.3, startTime + note.time);
                }
            });
        }

        function playClickSound() {
            if (!audioContext) initAudio();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            const now = audioContext.currentTime;
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

            oscillator.start(now);
            oscillator.stop(now + 0.1);
        }

        function playSuccessSound() {
            if (!audioContext) initAudio();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            const notes = [523, 659, 784, 1047];
            const now = audioContext.currentTime;

            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.2);
                }, i * 100);
            });
        }

        musicButton.addEventListener('click', function() {
            initAudio();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (!isMusicPlaying) {
                playBirthdayMelody();
                isMusicPlaying = true;
                musicButton.classList.add('playing');
                musicButton.textContent = '🎵';
                setTimeout(() => {
                    isMusicPlaying = false;
                    musicButton.classList.remove('playing');
                }, 7000);
            }
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, color, size = null) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = size || Math.random() * 4 + 2;
                this.velocityX = (Math.random() - 0.5) * 12;
                this.velocityY = (Math.random() - 0.5) * 12;
                this.gravity = 0.15;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.008;
                this.trail = [];
            }

            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > 8) {
                    this.trail.shift();
                }

                this.velocityY += this.gravity;
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.alpha -= this.decay;

                this.velocityX *= 0.99;
            }

            draw() {
                this.trail.forEach((point, index) => {
                    ctx.save();
                    ctx.globalAlpha = point.alpha * 0.3;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, this.size * (index / this.trail.length), 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                });

                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createFirework(x, y, type = 'normal') {
            const colors = [
                '#FF6B9D', '#FFD93D', '#6BCB77', '#4ECDC4', '#FF8E53',
                '#A855F7', '#FF69B4', '#00CED1', '#FF4500', '#FFE4B5'
            ];

            let particleCount = 60;
            let spread = 10;

            if (type === 'big') {
                particleCount = 120;
                spread = 15;
            } else if (type === 'trail') {
                particleCount = 40;
                spread = 6;
            }

            const baseColor = colors[Math.floor(Math.random() * colors.length)];

            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.PI * 2 / particleCount) * i;
                const speed = Math.random() * spread + 4;
                const particle = new Particle(x, y, baseColor);

                particle.velocityX = Math.cos(angle) * speed;
                particle.velocityY = Math.sin(angle) * speed;
                particle.gravity = 0.12;
                particle.decay = Math.random() * 0.012 + 0.006;

                particles.push(particle);
            }
        }

        function createSparkleFirework(x, y) {
            const colors = ['#FFD93D', '#FFF', '#FFE4B5'];
            for (let i = 0; i < 30; i++) {
                const particle = new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], Math.random() * 2 + 1);
                particle.velocityX = (Math.random() - 0.5) * 6;
                particle.velocityY = (Math.random() - 0.5) * 6 - 3;
                particle.gravity = 0.05;
                particle.decay = 0.03;
                particles.push(particle);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();

                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                }
            });

            if (particles.length > 0) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function launchFireworks() {
            const positions = [
                [canvas.width * 0.2, canvas.height * 0.25],
                [canvas.width * 0.5, canvas.height * 0.15],
                [canvas.width * 0.8, canvas.height * 0.25],
                [canvas.width * 0.3, canvas.height * 0.35],
                [canvas.width * 0.7, canvas.height * 0.35],
                [canvas.width * 0.15, canvas.height * 0.4],
                [canvas.width * 0.85, canvas.height * 0.4]
            ];

            positions.forEach((pos, index) => {
                setTimeout(() => {
                    createFirework(pos[0], pos[1], index % 3 === 0 ? 'big' : 'normal');
                    createSparkleFirework(pos[0] + (Math.random() - 0.5) * 100, pos[1] + (Math.random() - 0.5) * 50);
                    if (!animationId) animate();
                }, index * 250);
            });
        }

        function createConfetti() {
            const colors = ['#FF6B9D', '#FFD93D', '#6BCB77', '#4ECDC4', '#FF8E53', '#A855F7', '#FF69B4', '#00CED1'];
            const shapes = ['square', 'circle', 'star', 'heart'];
            const confettiCount = 80;

            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti ' + shapes[Math.floor(Math.random() * shapes.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
                    confetti.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 5000);
                }, i * 40);
            }
        }

        function createBubbles() {
            const bubbleCount = 20;
            for (let i = 0; i < bubbleCount; i++) {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    const size = Math.random() * 30 + 10;
                    bubble.style.width = size + 'px';
                    bubble.style.height = size + 'px';
                    bubble.style.left = Math.random() * 100 + 'vw';
                    bubble.style.animationDuration = (Math.random() * 4 + 4) + 's';
                    document.body.appendChild(bubble);

                    setTimeout(() => bubble.remove(), 8000);
                }, i * 200);
            }
        }

        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.left = Math.random() * 50 + 'vw';
            star.style.top = Math.random() * 30 + 'vh';
            document.body.appendChild(star);

            const angle = Math.random() * 30 + 15;
            const distance = Math.random() * 200 + 100;

            star.animate([
                { transform: 'translate(0, 0) rotate(-' + angle + 'deg)', opacity: 1 },
                { transform: 'translate(' + distance + 'px, ' + (distance * 0.5) + 'px) rotate(-' + angle + 'deg)', opacity: 0 }
            ], {
                duration: 1000,
                easing: 'ease-out'
            });

            setTimeout(() => star.remove(), 1000);
        }

        function startAmbientEffects() {
            setInterval(() => {
                if (Math.random() > 0.7) {
                    createShootingStar();
                }
            }, 3000);

            setInterval(() => {
                if (Math.random() > 0.5) {
                    createBubbles();
                }
            }, 5000);
        }

        function createFloatingParticles() {
            const container = document.getElementById('floatingParticles');
            const hearts = ['💕', '💗', '💖', '✨', '⭐', '🌟', '💫'];

            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
                container.appendChild(heart);

                setTimeout(() => heart.remove(), 12000);
            }, 800);
        }

        let candlesBlown = 0;
        const totalCandles = 5;
        let candlesBlownOut = false;

        document.getElementById('cakeContainer').addEventListener('click', function() {
            if (candlesBlownOut) return;

            playClickSound();

            const candles = document.querySelectorAll('.candle');

            candles.forEach((candle, index) => {
                setTimeout(() => {
                    candle.classList.add('blown');
                }, index * 180);
            });

            setTimeout(() => {
                candlesBlownOut = true;
                document.getElementById('instruction').textContent = '🎉 许个愿吧！🎉';
                document.getElementById('instruction').style.animation = 'none';

                playBirthdayMelody();
                launchFireworks();
                createConfetti();
                createBubbles();

            }, totalCandles * 180 + 400);
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('.cake-container') || e.target.closest('.blessing-form') || e.target.closest('.modal')) return;
            createFirework(e.clientX, e.clientY, 'trail');
            createSparkleFirework(e.clientX, e.clientY);
            if (!animationId) animate();
        });

        const blessingColors = [
            'linear-gradient(135deg, #FF6B9D 0%, #FF8E53 100%)',
            'linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%)',
            'linear-gradient(135deg, #A855F7 0%, #6366F1 100%)',
            'linear-gradient(135deg, #FFD93D 0%, #FF8E53 100%)',
            'linear-gradient(135deg, #6BCB77 0%, #4CAF50 100%)',
            'linear-gradient(135deg, #FF69B4 0%, #DA70D6 100%)',
            'linear-gradient(135deg, #00CED1 0%, #20B2AA 100%)'
        ];

        const supabaseUrl = 'https://klyobsfcrejihfizldfq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtseW9ic2ZjcmVqaWhmaXpsZGZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODAxOTksImV4cCI6MjA5MjE1NjE5OX0.Rfza_gZ_EdrKGT6bTfyX1Elq5mGBGT-czJEUgjSqJbk';
        var supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function loadBlessings() {
            const { data, error } = await supabase
                .from('blessings')
                .select('*')
                .order('created_at', { ascending: false });

            const grid = document.getElementById('blessingGrid');

            if (error || !data || data.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎁</div>
                        <p class="empty-state-text">还没有祝福，快来写下第一条吧！</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = data.map((blessing, index) => `
                <div class="blessing-card" style="animation-delay: ${index * 0.1}s" data-id="${blessing.id}">
                    <div class="blessing-header" style="background: ${blessing.color}"></div>
                    <div class="blessing-content">
                        <div class="blessing-name-wrapper">
                            <span class="blessing-name-display blessing-name">匿名</span>
                            <span class="blessing-name-actual blessing-name" style="display:none">${escapeHtml(blessing.name)}</span>
                        </div>
                        <p class="blessing-message">${escapeHtml(blessing.message)}</p>
                        <p class="blessing-time">${formatTime(blessing.created_at)}</p>
                    </div>
                </div>
            `).join('');
        }

        async function saveBlessing(name, message) {
            const { error } = await supabase
                .from('blessings')
                .insert([
                    {
                        name: name,
                        message: message,
                        color: blessingColors[Math.floor(Math.random() * blessingColors.length)]
                    }
                ]);

            if (error) {
                console.error('Error saving blessing:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';

            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        const form = document.getElementById('blessingForm');
        const nameInput = document.getElementById('name');
        const messageInput = document.getElementById('message');
        const nameError = document.getElementById('nameError');
        const messageError = document.getElementById('messageError');
        const successMessage = document.getElementById('successMessage');

        function validateForm() {
            let isValid = true;

            nameError.classList.remove('show');
            messageError.classList.remove('show');

            const nameValue = nameInput.value.trim();
            const chineseRegex = /^[\u4e00-\u9fa5]{2,}$/;

            if (!nameValue) {
                nameError.textContent = '请输入你的名字';
                nameError.classList.add('show');
                isValid = false;
            } else if (!chineseRegex.test(nameValue)) {
                nameError.textContent = '名字必须是2个以上中文字';
                nameError.classList.add('show');
                isValid = false;
            }

            if (!messageInput.value.trim()) {
                messageError.classList.add('show');
                isValid = false;
            }

            return isValid;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validateForm()) return;

            await saveBlessing(nameInput.value.trim(), messageInput.value.trim());

            nameInput.value = '';
            messageInput.value = '';

            playSuccessSound();
            successMessage.classList.add('show');

            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 2500);

            loadBlessings();

            const grid = document.getElementById('blessingGrid');
            const firstCard = grid.querySelector('.blessing-card');
            if (firstCard) {
                firstCard.style.animation = 'none';
                firstCard.offsetHeight;
                firstCard.style.animation = 'cardIn 0.6s ease-out both';
            }
        });

        loadBlessings();

        createFloatingParticles();
        startAmbientEffects();

        const birthdayPerson = localStorage.getItem('birthdayPerson') || '';
        if (birthdayPerson) {
            updateBirthdayPerson(birthdayPerson);
        }

        function updateBirthdayPerson(name) {
            const heroTitle = document.getElementById('heroTitle');
            const heroSubtitle = document.getElementById('heroSubtitle');
            heroTitle.innerHTML = `🎂 ${escapeHtml(name)}生日快乐 🎂`;
            heroSubtitle.textContent = `${escapeHtml(name)}，愿你的每一天都像今天一样灿烂美好`;
            document.title = `🎂 ${escapeHtml(name)}生日快乐！`;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const nameFromUrl = urlParams.get('name');
        if (nameFromUrl) {
            updateBirthdayPerson(decodeURIComponent(nameFromUrl));
            localStorage.setItem('birthdayPerson', decodeURIComponent(nameFromUrl));
        }

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const settingsForm = document.getElementById('settingsForm');
        const birthdayNameInput = document.getElementById('birthdayName');
        const settingsPasswordInput = document.getElementById('settingsPassword');
        const passwordError = document.getElementById('passwordError');

        settingsBtn.addEventListener('click', function() {
            playClickSound();
            birthdayNameInput.value = localStorage.getItem('birthdayPerson') || '';
            settingsPasswordInput.value = '';
            passwordError.style.display = 'none';
            settingsModal.classList.add('show');
        });

        settingsModal.addEventListener('click', function(e) {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('show');
            }
        });

        settingsForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = birthdayNameInput.value.trim();
            const password = settingsPasswordInput.value;

            if (password !== 'wxy20050419') {
                passwordError.style.display = 'block';
                playClickSound();
                return;
            }

            if (name) {
                localStorage.setItem('birthdayPerson', name);
                updateBirthdayPerson(name);
                settingsModal.classList.remove('show');
                playBirthdayMelody();
                launchFireworks();
                createConfetti();
                createBubbles();
            }
        });

        const shareBtn = document.getElementById('shareBtn');
        const qrBtn = document.getElementById('qrBtn');
        const shareModal = document.getElementById('shareModal');
        const shareLink = document.getElementById('shareLink');
        const copyBtn = document.getElementById('copyBtn');

        qrBtn.addEventListener('click', function() {
            playClickSound();
            const personName = localStorage.getItem('birthdayPerson');
            let shareUrl = window.location.origin + window.location.pathname;
            if (personName) {
                shareUrl += '?name=' + encodeURIComponent(personName);
            }
            shareModal.classList.add('show');

            const qrCanvas = document.getElementById('qrCode');
            QRCode.toCanvas(qrCanvas, shareUrl, {
                width: 200,
                margin: 2,
                color: {
                    dark: '#333333',
                    light: '#ffffff'
                }
            });
        });

        shareModal.addEventListener('click', function(e) {
            if (e.target === shareModal) {
                shareModal.classList.remove('show');
            }
        });

        const revealBtn = document.getElementById('revealBtn');
        const revealModal = document.getElementById('revealModal');
        const revealForm = document.getElementById('revealForm');
        const revealPasswordInput = document.getElementById('revealPassword');
        const revealPasswordError = document.getElementById('revealPasswordError');

        revealBtn.addEventListener('click', function() {
            playClickSound();
            revealPasswordInput.value = '';
            revealPasswordError.style.display = 'none';
            revealModal.classList.add('show');
        });

        revealModal.addEventListener('click', function(e) {
            if (e.target === revealModal) {
                revealModal.classList.remove('show');
            }
        });

        revealForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const password = revealPasswordInput.value;

            if (password !== 'wxy20050419') {
                revealPasswordError.style.display = 'block';
                playClickSound();
                return;
            }

            revealModal.classList.remove('show');

            document.querySelectorAll('.blessing-name-display').forEach(el => {
                el.style.display = 'none';
            });
            document.querySelectorAll('.blessing-name-actual').forEach(el => {
                el.style.display = '';
                el.parentElement.querySelector('.blessing-name-display').style.display = 'none';
            });

            revealBtn.style.display = 'none';
        });


    </script>
</body>
